---
- name: Setup K3s on HomeLab
  hosts: k8s_nodes
  become: true  # This means "Run as Sudo"
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name: 
          - curl
          - ca-certificates
        state: present

    - name: Download and Install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s  # Don't reinstall if it's already there!

    - name: Wait for Kubeconfig to be generated
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml

    - name: Fix permissions for Kubeconfig
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'
